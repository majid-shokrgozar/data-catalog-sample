version: '3.8'\nservices:\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_DB: datahub\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    networks:\n      - data_network\n\n  mysql:\n    image: mysql:latest\n    environment:\n      MYSQL_DATABASE: datahub\n      MYSQL_USER: user\n      MYSQL_PASSWORD: password\n      MYSQL_ROOT_PASSWORD: rootpassword\n    volumes:\n      - mysql_data:/var/lib/mysql\n    networks:\n      - data_network\n\n  datahub:\n    image: datahub/datahub:latest\n    environment:\n      # Add any necessary environment variables for DataHub\n    volumes:\n      - datahub_data:/datahub_data\n    networks:\n      - data_network\n\n  metadata_extractor:\n    image: your_metadata_extractor_image  # Replace with actual image\n    volumes:\n      - metadata_data:/metadata\n    networks:\n      - data_network\n\nnetworks:\n  data_network:\n\nvolumes:\n  postgres_data:\n  mysql_data:\n  datahub_data:\n  metadata_data:\n